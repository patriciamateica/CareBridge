<p-button icon="pi pi-trash" severity="danger" [rounded]="true" [text]="true" (click)="openDialog()"></p-button>

<p-dialog header="Delete Patient" [(visible)]="visible" [modal]="true" [style]="{ width: '26rem' }" appendTo="body">
  <div class="flex flex-col gap-4 pt-2">
    <div class="flex items-start gap-3">
      <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center shrink-0">
        <i class="pi pi-exclamation-triangle text-red-500"></i>
      </div>
      <p class="text-gray-700 leading-relaxed">
        Are you sure you want to remove
        <strong>{{ patientData().firstName }} {{ patientData().lastName }}</strong>
        from the patient roster? Changes are irreversible.
      </p>
    </div>
    <div class="flex gap-3">
      <p-button label="Cancel" severity="secondary" [outlined]="true" class="flex-1" styleClass="w-full"
                (click)="visible.set(false)"></p-button>
      <p-button label="Remove Patient" class="flex-1" styleClass="w-full"
                (click)="confirmDelete()"></p-button>
    </div>
  </div>
</p-dialog>
