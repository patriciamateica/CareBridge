<p-button label="+ Add Patient" (onClick)="open()"></p-button>

<p-dialog header="Add Patient to Roster" [modal]="true" [(visible)]="visible"
          [style]="{ width: '28rem' }" dismissableMask>

  <form #patientForm="ngForm" (ngSubmit)="onSubmit(patientForm)" class="flex flex-col gap-4">

    <div class="flex flex-col gap-1">
      <label class="text-sm font-semibold text-gray-600">Account Email *</label>
      <input pInputText name="userEmail" placeholder="Enter patient's account email"
             [(ngModel)]="newPatient.userEmail" #email="ngModel"
             [invalid]="email.invalid && (email.touched || patientForm.submitted)"
             required email/>
      @if (email.invalid && (email.touched || patientForm.submitted)) {
        <p-message severity="error" size="small" variant="simple">A valid account email is required.</p-message>
      }
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm font-semibold text-gray-600">Primary Diagnosis *</label>
      <input pInputText name="diagnosis" placeholder="e.g. Hypertension"
             [(ngModel)]="newPatient.diagnosis" #dx="ngModel"
             [invalid]="dx.invalid && (dx.touched || patientForm.submitted)"
             required/>
      @if (dx.invalid && (dx.touched || patientForm.submitted)) {
        <p-message severity="error" size="small" variant="simple">Diagnosis is required.</p-message>
      }
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm font-semibold text-gray-600">Status *</label>
      <p-select name="status" [options]="statusOptions"
                [(ngModel)]="newPatient.status"
                appendTo="body" styleClass="w-full" required/>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm font-semibold text-gray-600">Assigned Nurse *</label>
      <p-select name="assignedNurse"
                [options]="nurseOptions()"
                optionLabel="label"
                optionValue="value"
                placeholder="Select a nurse"
                [(ngModel)]="newPatient.assignedNurse"
                #nurse="ngModel"
                [invalid]="nurse.invalid && (nurse.touched || patientForm.submitted)"
                appendTo="body"
                styleClass="w-full"
                required/>
      @if (nurse.invalid && (nurse.touched || patientForm.submitted)) {
        <p-message severity="error" size="small" variant="simple">Required.</p-message>
      }
    </div>

    <div class="flex gap-3 pt-2">
      <p-button label="Cancel" severity="secondary" [outlined]="true"
                class="flex-1" styleClass="w-full"
                type="button" (onClick)="visible.set(false)"/>
      <p-button label="Add to Roster" class="flex-1" styleClass="w-full" type="submit"/>
    </div>

  </form>
</p-dialog>
