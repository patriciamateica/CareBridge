<div class="audit-logs-container">
  <div class="audit-logs-header">
    <h2>System Audit Logs</h2>
    <p>Monitor all system activities and user actions</p>
  </div>
  <div class="audit-logs-table-wrapper">
    <p-table
      [value]="auditLogs()"
      [rows]="rows"
      [first]="first"
      [totalRecords]="totalRecords"
      [paginator]="true"
      [loading]="loading()"
      [selectionMode]="'multiple'"
      [selection]="selectedRows()"
      (selectionChange)="onSelectionChange($event)"
      responsiveLayout="scroll"
      (onPage)="onPageChange($event)"
      styleClass="audit-logs-table"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 3rem"><p-tableHeaderCheckbox></p-tableHeaderCheckbox></th>
          <th pSortableColumn="timestamp">Timestamp</th>
          <th pSortableColumn="username">Username</th>
          <th pSortableColumn="role">Role</th>
          <th pSortableColumn="action">Action</th>
          <th pSortableColumn="resource">Resource</th>
          <th pSortableColumn="status">Status</th>
          <th pSortableColumn="ipAddress">IP Address</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-log>
        <tr>
          <td><p-tableCheckbox [value]="log"></p-tableCheckbox></td>
          <td>{{ formatDate(log.timestamp) }}</td>
          <td>{{ log.username }}</td>
          <td><p-tag [value]="log.role" severity="info"></p-tag></td>
          <td style="font-weight: 600;">{{ log.action }}</td>
          <td>{{ log.resource }}</td>
          <td><p-tag [value]="log.status" [severity]="getStatusSeverity(log.status)"></p-tag></td>
          <td><code>{{ log.ipAddress }}</code></td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="8">No audit logs found</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
