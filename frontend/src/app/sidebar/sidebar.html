<div class="lg:hidden p-4">
  <p-button icon="pi pi-bars" (click)="visible = true" severity="secondary" [text]="true" />
</div>

<aside class="hidden lg:block h-screen w-72 border-r border-white/10">
  <ng-container *ngTemplateOutlet="sidebarContent"></ng-container>
</aside>

<p-drawer [(visible)]="visible" [style]="{'background': '#5F8D5F', 'border': 'none', 'width': '300px'}">
  <ng-container *ngTemplateOutlet="sidebarContent"></ng-container>
</p-drawer>

<ng-template #sidebarContent>
  <div class="h-full flex flex-col text-white font-sans"
       [style.background]="'#5F8D5F'"
       style="box-shadow: none !important; border: none !important;">

    <div class="w-full pt-10 pb-8 px-4 border-b border-white/20 flex justify-center items-center">
      <img src="Logo App SDI_white.png"
           alt="CareBridge Logo"
           class="max-w-[220px] w-full h-auto object-contain scale-110">
    </div>

    <div class="flex-grow p-4 overflow-y-auto" style="background: transparent !important;">
      <div class="flex flex-col w-full gap-6" style="background: transparent !important; border: none !important;">

        @for (section of menuSections; track section.label) {
          @if (section.roles.includes(userRole)) {
            <div class="flex flex-col gap-2">

              <span class="text-xs font-bold uppercase tracking-widest text-white/50 px-4 mb-1">
                {{ section.label }}
              </span>

              @for (route of section.items; track route.path) {
                @if (route.roles.includes(userRole)) {
                  <a (click)="visible = false"
                     [routerLinkActiveOptions]="{ exact: true }"
                     [routerLink]="route.path"
                     class="group p-4 rounded-xl transition-all duration-300 no-underline flex items-center gap-4 text-white hover:bg-white/10"
                     routerLinkActive="bg-white/20 shadow-sm font-bold !text-white">
                    <i [class]="'pi ' + ' text-xl transition-transform group-hover:scale-110'"></i>
                    <span class="text-xl tracking-wide">{{ route.title }}</span>
                  </a>
                }
              }
            </div>
          }
        }
      </div>
    </div>

    <div class="p-6 border-t border-white/10 flex justify-between items-center bg-black/10">
      <div class="flex gap-6 text-2xl text-white">
        <i class="pi pi-cog cursor-pointer hover:scale-110 transition-transform hover:text-emerald-200"></i>
        <i class="pi pi-bell cursor-pointer hover:scale-110 transition-transform hover:text-emerald-200"></i>
      </div>
      <span class="text-base font-semibold cursor-pointer hover:underline opacity-90 text-white">
        Log out
      </span>
    </div>

  </div>
</ng-template>
