<div class="lg:hidden flex justify-between items-center p-3 bg-[#5F8D5F]">
  <img src="Logo App SDI_white.png" alt="CareBridge Logo" class="h-8 ml-2 object-contain">
  <p-button icon="pi pi-bars" (click)="visible = true" severity="secondary" [text]="true" styleClass="text-white"/>
</div>

<aside class="hidden lg:block w-[18rem] h-screen sticky top-0 shrink-0 bg-[#5F8D5F]">
  <ng-container *ngTemplateOutlet="sidebarContent"></ng-container>
</aside>

<div class="lg:hidden">
  <p-drawer [(visible)]="visible"
            [modal]="false"
            [showCloseIcon]="false"
            styleClass="carebridge-drawer"
            [style]="{'background': '#5F8D5F', 'border': 'none', 'padding': '0', 'width': '280px'}">
    <ng-container *ngTemplateOutlet="sidebarContent"></ng-container>
  </p-drawer>
</div>

<ng-template #sidebarContent>
  <div class="sidebar-container">
    <div class="logo-section">
      <img src="Logo App SDI_white.png"
           alt="CareBridge Logo"
           class="max-w-[200px] w-full h-auto object-contain">
    </div>

    <div class="menu-area">
      <div class="flex flex-col w-full gap-6">
        @for (section of menuSections; track section.label) {
          @if (section.roles.includes(userRole)) {
            <div class="flex flex-col gap-2">
              <span class="menu-header">{{ section.label }}</span>
              @for (item of section.items; track item.path) {
                @if (item.roles.includes(userRole)) {
                  <a [routerLink]="item.path"
                     routerLinkActive="active-link"
                     class="menu-item"
                     (click)="visible = false">
                    {{ item.title }}
                  </a>
                }
              }
            </div>
          }
        }
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="flex gap-6 text-2xl text-white">
        <i class="pi pi-cog icon-btn"></i>
        <i class="pi pi-bell icon-btn"></i>
      </div>
      <span class="logout-btn" (click)="logout()">Log out</span>
    </div>

  </div>
</ng-template>
