name: Backend Tests 🧪

on: [push]

permissions:
  contents: read
  pull-requests: write

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources 📄
        uses: actions/checkout@v6

      - name: Setup Java ☕
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 24

      - name: Run backend tests 🧪
        run: ./backend/gradlew -p ./backend/ test -PexcludeTags=architecture
