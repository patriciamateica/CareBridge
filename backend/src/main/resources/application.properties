spring.datasource.url=jdbc:postgresql://localhost:5433/carebridge_db
spring.datasource.username=postgres
spring.datasource.password=dbpassword
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.config.import=optional:file:.env

spring.data.mongodb.uri=mongodb://mongo:password@localhost:27017/chat_db?authSource=admin
spring.data.mongodb.database=chat_db

server.port=${PORT:8443}
server.ssl.enabled=false
#server.ssl.key-store=classpath:carebridge-dev.p12
#server.ssl.key-store-type=PKCS12
#server.ssl.key-store-password=carebridge123
#server.ssl.key-alias=carebridge
#server.ssl.protocol=TLS
#server.ssl.enabled-protocols=TLSv1.2,TLSv1.3

app.security.jwt.expiration-hours=24
app.security.jwt.inactivity-minutes=15

app.security.cookie.http-only=true
app.security.cookie.secure=true
app.security.cookie.same-site=None
app.security.cookie.path=/
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000
spring.mail.protocol=smtp
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.debug=true

spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

logging.level.com.carebridge.backend.password=DEBUG
logging.level.com.carebridge.backend.security=DEBUG
logging.level.org.springframework.mail=DEBUG
logging.level.org.springframework.mail.javamail=DEBUG

