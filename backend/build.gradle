plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.4'
    id 'io.spring.dependency-management' version '1.1.7'
    id "org.openapi.generator" version "7.15.0"
    id 'java-library'
    id 'jacoco'
}

group = 'com.carebridge'
version = '0.0.1-SNAPSHOT'

def frontendPath = "$projectDir/../frontend"
def backendStaticPath = "$projectDir/src/main/resources/static"
def frontendDistPath = "$frontendPath/dist"

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
}

dependencies {

    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.data:spring-data-commons'
    compileOnly 'org.projectlombok:lombok'

    annotationProcessor 'org.projectlombok:lombok'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testRuntimeOnly 'com.h2database:h2'

    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'
    testImplementation 'org.mockito:mockito-core'
    implementation 'org.springframework.boot:spring-boot-starter-websocket'

    implementation 'org.springframework.boot:spring-boot-starter-graphql'
    implementation 'org.springframework.boot:spring-boot-starter-webflux'
    testImplementation 'org.springframework.graphql:spring-graphql-test'

    implementation('com.github.javafaker:javafaker:1.0.2') {
        exclude group: 'org.yaml', module: 'snakeyaml'
    }

    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    runtimeOnly 'org.postgresql:postgresql'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-data-mongodb'
    implementation 'org.springframework.boot:spring-boot-starter-aop'
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.8.3'

    implementation 'org.springframework.boot:spring-boot-starter-mail'
}

tasks.named('test') {
    useJUnitPlatform()
    systemProperty 'io.netty.noUnsafe', 'true'
    jvmArgs('--sun-misc-unsafe-memory-access=allow')
    finalizedBy jacocoTestReport
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = false
        csv.required = false
        html.required = true
    }
}
openApiGenerate {
    generatorName.set("typescript-angular")
    inputSpec.set(file("${projectDir}/openapi.yaml").toURI().toString())
    outputDir.set("$frontendPath/typescript-client")
    apiPackage.set("api")
    modelPackage.set("model")
    cleanupOutput.set(true)
}

tasks.register('generateOpenApiDocs', Test) {
    dependsOn testClasses
    useJUnitPlatform()
    systemProperty 'io.netty.noUnsafe', 'true'
    jvmArgs('--sun-misc-unsafe-memory-access=allow')

    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath

    filter {
        includeTestsMatching "com.carebridge.backend.OpenApiExportTest"
    }

    outputs.upToDateWhen { false }

    doFirst {
        println "========================================"
        println "OPENAPI DOCS: Running OpenApiExportTest"
        println "========================================"

        def specFile = file("${projectDir}/openapi.yaml")
        if (specFile.exists()) {
            println "CLEANUP: Deleting old openapi.yaml"
            specFile.delete()
        }
    }

    doLast {
        def openapiFile = file("${projectDir}/openapi.yaml")
        if (openapiFile.exists()) {
            println "OPENAPI DOCS: openapi.yaml generated successfully"
            println "  Location: ${projectDir}/openapi.yaml"
            println "  Size: ${openapiFile.length()} bytes"
        } else {
            println "WARNING: openapi.yaml was NOT generated!"
        }
        println "========================================\n"
    }
}

tasks.named('openApiGenerate') {
    dependsOn tasks.named('generateOpenApiDocs')
}

